allowBuilds:
  # dev-only nativer File-Watcher (via vite-plugin-vue-devtools -> @vue/devtools).
  # Build-Script freigeben, sonst bricht pnpm 11 den Install ab (ERR_PNPM_IGNORED_BUILDS).
  '@parcel/watcher': true
  core-js: true
  esbuild: true
  vue-demi: true

# Sicherheits-Overrides fuer transitive Deps (pnpm >=10 liest overrides hier,
# nicht mehr aus package.json). form-data <4.0.6: CRLF-Injection via axios.
overrides:
  form-data: '>=4.0.6'
